<!DOCTYPE html>
<html>
<head>
    <title>CareerTrail - Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#e2e8f0;
        }

        .container{
            width:1000px;
            height:550px;
            background:white;
            border-radius:20px;
            overflow:hidden;
            display:flex;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .left{
    flex:1;
    background:#f8fafc;
    color:#1e293b;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:40px;
}

        .left h1{
            font-size:40px;
            margin-bottom:20px;
        }

        .left p{
            text-align:center;
            line-height:1.6;
        }

        .right{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .form-box{
            width:80%;
        }

        .form-box h2{
            margin-bottom:25px;
            color:#2563eb;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:1px solid #ddd;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:14px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1d4ed8;
        }

        a{
            text-decoration:none;
            color:#2563eb;
            font-weight:bold;
        }

        .register{
            margin-top:15px;
            text-align:center;
        }
        .logo{

    font-size:42px;

    font-weight:800;

    color:#2563eb;

    letter-spacing:-1px;

    text-align:center;

    margin-bottom:25px;

    text-shadow:
        0 0 12px rgba(37,99,235,0.20);
}

.logo span{

    color:#22c55e;
}

    </style>

</head>

<body>

<div class="container">

    <div class="left">

        <img
                src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                alt="Career"
                width="220">

        <div class="logo">
            CareerTrail<span>.</span>
        </div>

        <p>
            Track applications, prepare for interviews,
            and build your professional career journey.
        </p>

    </div>

    <div class="right">

        <div class="form-box">

            <h2>Welcome Back</h2>

            <form action="/login" method="post">

                <input
                        type="email"
                        name="username"
                        placeholder="Email"
                        required>

                <input
                        type="password"
                        name="password"
                        placeholder="Password"
                        required>

                <button type="submit">
                    Login
                </button>

            </form>

            <div class="register">
                New User?
                <a href="/register">
                    Register Here
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
