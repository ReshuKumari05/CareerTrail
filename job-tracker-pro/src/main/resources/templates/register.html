<!DOCTYPE html>
<html>
<head>
    <title>CareerTrail - Register</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#e2e8f0;
        }

        .container{
            width:1000px;
            height:600px;
            background:white;
            border-radius:20px;
            overflow:hidden;
            display:flex;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
        }

        .left{
            flex:1;
            background:#f8fafc;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            padding:40px;
            text-align:center;
        }

        .left h1{
            color:#2563eb;
            margin-top:20px;
            margin-bottom:15px;
        }

        .left p{
            color:#64748b;
            line-height:1.6;
        }

        .right{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:80%;
        }

        .card h2{
            color:#2563eb;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:1px solid #d1d5db;
            border-radius:10px;
        }

        input:focus{
            outline:none;
            border-color:#2563eb;
        }

        button{
            width:100%;
            padding:14px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1d4ed8;
        }

        .login-link{
            text-align:center;
            margin-top:15px;
        }

        .login-link a{
            color:#2563eb;
            text-decoration:none;
            font-weight:bold;
        }
       .logo{

    font-size:42px;

    font-weight:800;

    color:#2563eb;

    letter-spacing:-1px;

    text-align:center;

    margin-bottom:25px;

    text-shadow:
        0 0 12px rgba(37,99,235,0.20);
}

.logo span{

    color:#22c55e;
}
    </style>

</head>

<body>

<div class="container">

    <div class="left">

        <img
                src="https://cdn-icons-png.flaticon.com/512/3135/3135789.png"
                alt="Career"
                width="230">

        <div class="logo">
            CareerTrail<span>.</span>
        </div>

        <p>
            Create your account and start tracking
            applications, interviews and offers
            in one place.
        </p>

    </div>

    <div class="right">

        <div class="card">

            <h2>Create Account</h2>

            <form action="/register" method="post">

                <input
                        type="text"
                        name="name"
                        placeholder="Full Name"
                        required>

                <input
                        type="email"
                        name="email"
                        placeholder="Email Address"
                        required>

                <input
                        type="password"
                        name="password"
                        placeholder="Password"
                        required>

                <button type="submit">
                    Register
                </button>

            </form>

            <div class="login-link">

                Already have an account?

                <a href="/login">
                    Login
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
