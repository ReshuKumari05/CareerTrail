<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Application</title>

    <style>
        body{
             background:#0f172a;
    padding:40px;
    color:white;
            font-family: Arial, sans-serif;
            width: 500px;
            margin: 50px auto;
        }

       input, select, textarea{

    width:100%;

    padding:12px;

    margin-bottom:15px;

    border-radius:10px;

    border:1px solid #475569;

    background:#0f172a;

    color:white;

    font-size:15px;
}

        button{

    width:100%;

    background:#2563eb;

    color:white;

    padding:14px;

    border:none;

    border-radius:12px;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    transform:translateY(-2px);

    background:#1d4ed8;
}
        .form-card{
    background:#1e293b;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    max-width:600px;
    margin:auto;
}
        h2{
    color:#3b82f6;
    margin-bottom:8px;
}

.subtitle{
    color:#94a3b8;
    margin-bottom:25px;
    text-align:center;
}
        .page-title{

    text-align:center;

    font-size:38px;

    font-weight:700;

    letter-spacing:-0.5px;

    color:#e2e8f0;

    margin-bottom:10px;
}

.page-title span{

    color:#22c55e;
}

body.light .page-title{

    color:#1e293b;
}
    </style>
</head>
<body>
<h1 class="page-title">
    Add <span>Application</span>
</h1>

<p class="subtitle">
    Track your applications and interviews
</p>
<div class="form-card">
<form action="/save" method="post">

    <h3 th:text="${application.companyName}"></h3>

    <input type="text"
           name="companyName"
           placeholder="Company Name"
           th:value="${application != null ? application.companyName : ''}">
    <input type="text"
           name="role"
           placeholder="Role"
           th:value="${application != null ? application.role : ''}">
    <input type="text"
           name="location"
           placeholder="Location"
           th:value="${application != null ? application.location : ''}">
    <input type="date"
           name="appliedDate"
           th:value="${application != null ? application.appliedDate : ''}">
    <select name="status">
        <option value="APPLIED">APPLIED</option>
        <option value="INTERVIEW_SCHEDULED">INTERVIEW_SCHEDULED</option>
        <option value="SELECTED">SELECTED</option>
        <option value="REJECTED">REJECTED</option>
    </select>
    <label>Application Source</label>

    <select name="source">

        <option value="LinkedIn"
                th:selected="${application != null && application.source == 'LinkedIn'}">
            LinkedIn
        </option>

        <option value="Naukri"
                th:selected="${application != null && application.source == 'Naukri'}">
            Naukri
        </option>

        <option value="Referral"
                th:selected="${application != null && application.source == 'Referral'}">
            Referral
        </option>

        <option value="Company Website"
                th:selected="${application != null && application.source == 'Company Website'}">
            Company Website
        </option>

        <option value="Other"
                th:selected="${application != null && application.source == 'Other'}">
            Other
        </option>

    </select>
    <br><br>

    <label>Interview Date</label>

    <input type="date"
           name="interviewDate"
           th:value="${application != null ? application.interviewDate : ''}">
    <br><br>
    <textarea name="notes"
              placeholder="Notes"
              th:text="${application != null ? application.notes : ''}">
</textarea>

    <button type="submit">
        🚀 Save Application
    </button>

</form>
</div>

</body>
</html>
