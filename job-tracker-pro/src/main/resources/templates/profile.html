<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Profile</title>

     <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI,sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .profile-card{
            width:700px;
            background:#1e293b;
            border-radius:20px;
            padding:35px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        h1{
            color:#3b82f6;
            margin-bottom:25px;
        }

        .field{
            margin-bottom:18px;
        }

        .field label{
            display:block;
            margin-bottom:6px;
            color:#94a3b8;
            font-size:14px;
        }

        .field input{
            width:100%;
            padding:12px;
            border-radius:10px;
            border:1px solid #475569;
            background:#0f172a;
            color:white;
            font-size:15px;
        }

        .field input:focus{
            outline:none;
            border-color:#3b82f6;
        }

        .btn-container{
            display:flex;
            gap:15px;
            margin-top:25px;
        }

        .btn{
            text-decoration:none;
            padding:12px 18px;
            border-radius:10px;
            color:white;
            font-weight:600;
            border:none;
            cursor:pointer;
        }
.save-btn{

    background:#22c55e;

    color:white;

    font-weight:700;

    transition:0.25s;

    cursor:pointer;
}
.save-btn:hover{

    background:#16a34a;

    transform:translateY(-2px);

    box-shadow:0 8px 15px rgba(34,197,94,0.25);
}
.save-btn:active{

    transform:scale(0.96);
}

        .back-btn{
            background:#2563eb;
        }

        .logout-btn{
            background:#ef4444;
        }
         @keyframes slideIn {

    from{
        transform:translateX(100px);
        opacity:0;
    }

    to{
        transform:translateX(0);
        opacity:1;
    }
}
         .saved-banner{
    animation:fadeOut 6s forwards;
}
         @keyframes fadeOut{

    0%,90%{
        opacity:1;
    }

    100%{
        opacity:0;
    }
}
         .saved-banner{
    position:fixed;
    top:20px;
    right:20px;
    background:#22c55e;
    color:white;
    padding:15px 25px;
    border-radius:12px;
    font-weight:bold;
    z-index:9999;
    animation:fadeOut 8s forwards;
}
         .page-title{

    text-align:center;

    font-size:38px;

    font-weight:700;

    letter-spacing:-0.5px;

    color:#e2e8f0;

    margin-bottom:10px;
}

.page-title span{

    color:#22c55e;
}
         body.light .page-title{

    color:#1e293b;
}

    </style>


</head>
<body>

<div class="profile-card">


    <h1 class="page-title">
        Account <span>Profile</span>
    </h1>
    <div th:if="${saved}"
         style="
     background:#22c55e;
     color:white;
     padding:12px;
     border-radius:10px;
     margin-bottom:20px;
     text-align:center;
     font-weight:bold;">
        ✅ Profile Saved Successfully
    </div>

    <form action="/save-profile" method="post">

        <div class="field">
            <label>Name</label>
            <input type="text"
                   name="name"
                   th:value="${user.name}">
        </div>

        <div class="field">
            <label>Email</label>
            <input type="email"
                   th:value="${user.email}"
                   readonly>
        </div>

        <div class="field">
            <label>Current Company</label>
            <input type="text"
                   name="currentCompany"
                   th:value="${user.currentCompany}">
        </div>

        <div class="field">
            <label>Current Role</label>
            <input type="text"
                   name="currentRole"
                   th:value="${user.currentRole}">
        </div>

        <div class="field">
            <label>Experience Level</label>
            <input type="text"
                   name="experienceLevel"
                   th:value="${user.experienceLevel}">
        </div>

        <div class="field">
            <label>Current Location</label>
            <input type="text"
                   name="currentLocation"
                   th:value="${user.currentLocation}">
        </div>

        <div class="btn-container">


            <button type="submit"
                    id="saveBtn"
                    class="btn save-btn">
                💾 Save Profile
            </button>

            <a href="/applications"
               class="btn back-btn">
                Back
            </a>

            <a href="/logout"
               class="btn logout-btn">
                Logout
            </a>

        </div>
        <div th:if="${param.saved}"
             class="saved-banner">
            ✅ Profile Saved Successfully
        </div>

    </form>


</div>
<script>

    document.querySelector("form").addEventListener("submit", function(e){

    e.preventDefault();

    const btn = document.getElementById("saveBtn");

    btn.innerHTML = "✅ Profile Saved";

    btn.style.background = "#16a34a";

    btn.style.transform = "scale(1.05)";

    btn.disabled = true;

    setTimeout(() => {
        this.submit();
    }, 3000);

});


</script>
</body>
</html>
