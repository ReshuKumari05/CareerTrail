<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Career Analytics</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js">

    </script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI,sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
            padding:30px;
        }

        h1{
            text-align:center;
            color:#3b82f6;
            margin-bottom:30px;
        }

        .top{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:20px;
            margin-bottom:30px;
        }
.card{
    background:#243447;
    padding:18px;
    border-radius:14px;
    text-align:center;
}

        .card:hover{
            transform:translateY(-5px);
        }

        .card h2{
            font-size:36px;
            margin-bottom:10px;
            color:#22c55e;
        }

        .card p{
            color:#94a3b8;
        }

        .chart-box{
            background:#1e293b;
            padding:25px;
            border-radius:18px;
            margin-bottom:30px;
        }

        .rates{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:20px;
        }
.rate-card{
    background:#243447;
    padding:18px;
    border-radius:14px;
    text-align:center;
}

        .rate-card h2{
            color:#60a5fa;
            font-size:32px;
        }

        .back-btn{
            display:inline-block;
            margin-bottom:25px;
            background:#2563eb;
            color:white;
            padding:12px 20px;
            border-radius:10px;
            text-decoration:none;
        }
      .page-title{

    font-size:38px;

    font-weight:700;

    letter-spacing:-0.5px;

    color:#e2e8f0;

    text-align:center;

    margin-bottom:10px;
}
        body.light .page-title{
    color:#1e293b;
}
        body.light .page-title{

    color:#1e293b;
}

    </style>

</head>

<body>

<a href="/applications" class="back-btn">
    ← Back
</a>

<h1 class="page-title">
    Career <span>Analytics</span>
</h1>
<div class="top">

    <div class="card">
        <h2 th:text="${total}">0</h2>
        <p>Total Applications</p>
    </div>

    <div class="card">
        <h2 th:text="${applied}">0</h2>
        <p>📨 Applied</p>
    </div>

    <div class="card">
        <h2 th:text="${interview}">0</h2>
        <p>🎯 Interview</p>
    </div>

    <div class="card">
        <h2 th:text="${selected}">0</h2>
        <p>🏆 Selected</p>
    </div>

</div>

<div class="chart-box">

    <div style="width:320px;height:320px;margin:auto;">
        <canvas id="statusChart"></canvas>
    </div>

</div>

<div class="rates">

    <div class="rate-card">
        <h2 th:text="${#numbers.formatDecimal(selectionRate,1,1)} + '%'">
            0%
        </h2>
        <p>🏆 Selection Rate</p>
    </div>

    <div class="rate-card">
        <h2 th:text="${#numbers.formatDecimal(rejectionRate,1,1)} + '%'">
            0%
        </h2>
        <p>❌ Rejection Rate</p>
    </div>

    <div class="rate-card">
        <h2 th:text="${#numbers.formatDecimal(interviewRate,1,1)} + '%'">
            0%
        </h2>
        <p>🎯 Interview Rate</p>
    </div>

    <div class="rate-card">
        <h2 th:text="${#numbers.formatDecimal(appliedRate,1,1)} + '%'">
            0%
        </h2>
        <p>📨 Applied Rate</p>
    </div>

</div>
<script>

    new Chart(
        document.getElementById('statusChart'),
        {
            type: 'pie',

            data: {
                labels: [
                    'Applied',
                    'Interview',
                    'Selected',
                    'Rejected'
                ],

                datasets: [{
                    data: [
                        [[${applied}]],
                        [[${interview}]],
                        [[${selected}]],
                        [[${rejected}]]
                    ]
                }]
            },

            options: {
                plugins: {
                    legend: {
                        labels: {
                            color: 'white',
                            font: {
                                weight: 'bold'
                            }
                        }
                    }
                }
            }
        }
    );

</script>

</body>
</html>
